name: AkroGram Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NDK_VERSION:  '27.2.12479018'
  CMAKE_VERSION: '3.22.1'

jobs:
  build-debug:
    name: 🔨 Debug Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Telegram source
        run: |
          git clone --depth=1 https://github.com/DrKLO/Telegram telegram-src

          # Java كامل من DrKLO
          rsync -av telegram-src/TMessagesProj/src/main/java/ \
                TMessagesProj/src/main/java/

          # ← الإضافة المهمة: resources كاملة
          rsync -av telegram-src/TMessagesProj/src/main/res/ \
                TMessagesProj/src/main/res/

          # ملفات الإعداد
          cp telegram-src/TMessagesProj/build.gradle TMessagesProj/build.gradle
          cp telegram-src/gradle.properties gradle.properties
          cp telegram-src/TMessagesProj/google-services.json TMessagesProj/google-services.json

          # تفعيل buildConfig
          sed -i '/android {/a\\n    buildFeatures {\n        buildConfig true\n    }' \
              TMessagesProj/build.gradle

          # رفع minSdk إلى 24
          sed -i 's/minSdkVersion 21/minSdkVersion 24/g' TMessagesProj/build.gradle

          # رفع compileSdk و targetSdk إلى 35
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' TMessagesProj/build.gradle
          sed -i 's/targetSdkVersion 34/targetSdkVersion 35/g' TMessagesProj/build.gradle

          echo "✅ All files synced from DrKLO"
          echo "--- Java files ---"
          find TMessagesProj/src/main/java -name "*.java" | wc -l
          echo "--- Res folders ---"
          ls TMessagesProj/src/main/res/

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake
        run: |
          echo "y" | sdkmanager "ndk;${{ env.NDK_VERSION }}"
          echo "y" | sdkmanager "cmake;${{ env.CMAKE_VERSION }}"

      - name: Inject API credentials
        env:
          TG_API_ID:   ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
        run: |
          if [ -n "$TG_API_ID" ]; then
            sed -i "s/\"35978619\"/\"$TG_API_ID\"/" \
              app/src/main/java/com/akro/agram/network/TelegramController.java
            sed -i "s/\"7521a35c396ddecada6da6a8687a0324\"/\"$TG_API_HASH\"/" \
              app/src/main/java/com/akro/agram/network/TelegramController.java
            echo "✅ API credentials injected"
          else
            echo "ℹ️ Using hardcoded credentials"
          fi

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            mkdir -p gradle/wrapper
            curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x gradlew
          echo "✅ Gradle wrapper ready"

      - name: Create debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair -v \
            -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt
          echo "✅ debug.keystore created"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build-log.txt

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build-log.txt
          retention-days: 7

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AkroGram-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
