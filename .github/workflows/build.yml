name: AkroGram Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NDK_VERSION:  '25.2.9519653'
  CMAKE_VERSION: '3.22.1'

jobs:
  build-debug:
    name: 🔨 Debug Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Telegram source
        run: |
          git clone --depth=1 https://github.com/DrKLO/Telegram telegram-src
          cp -r telegram-src/TMessagesProj/src/main/java/org/telegram \
                TMessagesProj/src/main/java/org/
          echo "✅ Telegram source copied"

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake
        run: |
          echo "y" | sdkmanager "ndk;${{ env.NDK_VERSION }}"
          echo "y" | sdkmanager "cmake;${{ env.CMAKE_VERSION }}"

      - name: Inject API credentials
        env:
          TG_API_ID:   ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
        run: |
          if [ -n "$TG_API_ID" ]; then
            sed -i "s/\"35978619\"/\"$TG_API_ID\"/" \
              app/src/main/java/com/akro/agram/network/TelegramController.java
            sed -i "s/\"7521a35c396ddecada6da6a8687a0324\"/\"$TG_API_HASH\"/" \
              app/src/main/java/com/akro/agram/network/TelegramController.java
            echo "✅ API credentials overridden from secrets"
          else
            echo "ℹ️ Using hardcoded credentials from source"
          fi

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "📥 Downloading gradle-wrapper.jar..."
            mkdir -p gradle/wrapper
            curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi
          if [ ! -f "gradlew" ]; then
            echo "❌ gradlew not found!"
            exit 1
          fi
          chmod +x gradlew
          echo "✅ Gradle wrapper ready"

      - name: Extract native libs (if present)
        run: |
          if ls *.zip 1>/dev/null 2>&1; then
            for f in *.zip; do
              echo "Trying to extract native files from $f..."
              unzip -q "$f" \
                "*/jni/tgnet/*" \
                "*/jni/sqlite/*" \
                "*/jni/tde2e/*" \
                "*/jni/TgNetWrapper.cpp" \
                "*/jni/jni.c" \
                -d TMessagesProj/ 2>/dev/null || true
            done
          else
            echo "⚠️ No ZIP files found — skipping native extraction"
          fi

      - name: Create debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair -v \
            -keystore $HOME/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt
          echo "✅ debug.keystore created"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build-log.txt

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build-log.txt
          retention-days: 7

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AkroGram-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  lint:
    name: 🔍 Lint Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone Telegram source
        run: |
          git clone --depth=1 https://github.com/DrKLO/Telegram telegram-src
          cp -r telegram-src/TMessagesProj/src/main/java/org/telegram \
                TMessagesProj/src/main/java/org/

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v3

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            mkdir -p gradle/wrapper
            curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint --no-daemon

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          retention-days: 7
